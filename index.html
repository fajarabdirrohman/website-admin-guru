  <script>
// ============ STATE ============
let allData = [];
let currentUser = null;
let currentPage = 'dashboard';
let appTheme = 'light';

const defaultConfig = { app_title: 'Sistem Administrasi Guru' };

// ============ ELEMENT SDK ============
if (window.elementSdk) {
    window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {},
        mapToCapabilities: (config) => ({ recolorables: [], borderables: [], fontEditable: undefined, fontSizeable: undefined }),
        mapToEditPanelValues: (config) => new Map([['app_title', config.app_title || defaultConfig.app_title]])
    });
}

// ============ DATA SDK ============
let sdkReady = false;
const dataHandler = {
    onDataChanged(data) {
        allData = data || [];
        if (currentUser) renderCurrentPage();
    }
};

// Local fallback Data SDK: dipakai jika /_sdk/data_sdk.js tidak tersedia,
// misalnya saat file HTML dibuka langsung di browser/di luar lingkungan Canva.
function createLocalDataSdk() {
    const storageKey = 'sistem_admin_guru_data_v1';
    let handlerRef = null;

    function readData() {
        try {
            return JSON.parse(localStorage.getItem(storageKey) || '[]');
        } catch (err) {
            console.warn('Gagal membaca localStorage, data direset:', err);
            return [];
        }
    }

    function writeData(data) {
        localStorage.setItem(storageKey, JSON.stringify(data));
        if (handlerRef && typeof handlerRef.onDataChanged === 'function') {
            handlerRef.onDataChanged(data);
        }
    }

    function makeId() {
        return 'local_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
    }

    return {
        async init(handler) {
            handlerRef = handler;
            const data = readData();
            if (handlerRef && typeof handlerRef.onDataChanged === 'function') {
                handlerRef.onDataChanged(data);
            }
            return { isOk: true };
        },
        async create(record) {
            const data = readData();
            const newRecord = { ...record, __backendId: record.__backendId || makeId() };
            data.push(newRecord);
            writeData(data);
            return { isOk: true, value: newRecord };
        },
        async update(record) {
            const data = readData();
            const index = data.findIndex(item => item.__backendId === record.__backendId);
            if (index === -1) return { isOk: false, error: { message: 'Data tidak ditemukan' } };
            data[index] = { ...record };
            writeData(data);
            return { isOk: true, value: data[index] };
        },
        async delete(record) {
            const data = readData();
            const nextData = data.filter(item => item.__backendId !== record.__backendId);
            writeData(nextData);
            return { isOk: true };
        }
    };
}

function withTimeout(promise, ms = 1500) {
    return Promise.race([
        promise,
        new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout Data SDK')), ms))
    ]);
}

async function useLocalDataSdk(reason = '') {
    console.warn('Menggunakan penyimpanan lokal browser.', reason);
    window.dataSdk = createLocalDataSdk();
    const result = await window.dataSdk.init(dataHandler);
    sdkReady = !!(result && result.isOk);
    return sdkReady;
}

async function initDataSdk() {
    if (sdkReady) return true;

    if (!window.dataSdk) {
        return await useLocalDataSdk('Data SDK tidak tersedia');
    }

    try {
        let result = await withTimeout(window.dataSdk.init(dataHandler), 1500);

        if (!result || !result.isOk) {
            return await useLocalDataSdk(result?.error?.message || 'Data SDK gagal init');
        }

        sdkReady = true;
        console.log('Data SDK initialized successfully');
        return true;
    } catch (err) {
        return await useLocalDataSdk(err.message || err);
    }
}

async function ensureDataReady() {
    if (sdkReady && window.dataSdk) return true;
    return await initDataSdk();
}

// Initialize Data SDK safely
initDataSdk();

// ============ HELPERS ============
function toast(msg, type = 'success') {
    const c = document.getElementById('toast-container');
    const colors = { success: 'bg-emerald-500', error: 'bg-red-500', info: 'bg-blue-500' };
    const el = document.createElement('div');
    el.className = `toast px-4 py-3 rounded-lg text-white text-sm font-medium shadow-lg ${colors[type]}`;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

function getByType(type) { return allData.filter(d => d.type === type); }
function getClasses() { return getByType('class'); }
function getStudents() { return getByType('student'); }
function getSchedules() { return getByType('schedule'); }
function getAttendance() { return getByType('attendance'); }
function getScores() { return getByType('score'); }
function getJournals() { return getByType('journal'); }
function getUsers() { return getByType('user'); }

function classDropdown(selected = '', id = 'filter-class') {
    const cls = getClasses();
    return `<select id="${id}" class="px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700 text-sm" onchange="renderCurrentPage()">
        <option value="">Semua Kelas</option>
        ${cls.map(c => `<option value="${c.class_name}" ${c.class_name === selected ? 'selected' : ''}>${c.class_name}</option>`).join('')}
    </select>`;
}

// ============ AUTH ============
function showRegister() { document.getElementById('login-form').classList.add('hidden'); document.getElementById('register-form').classList.remove('hidden'); hideError(); }
function showLogin() { document.getElementById('register-form').classList.add('hidden'); document.getElementById('login-form').classList.remove('hidden'); hideError(); }
function showError(msg) { const el = document.getElementById('login-error'); el.textContent = msg; el.classList.remove('hidden'); }
function hideError() { document.getElementById('login-error').classList.add('hidden'); }

async function doRegister() {
    hideError();
    if (!await ensureDataReady()) return showError('❌ Sistem gagal dimuat. Silakan refresh halaman.');
    
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim().toLowerCase();
    const pass = document.getElementById('reg-pass').value;
    const role = document.getElementById('reg-role').value;
    
    if (!name || !email || !pass) return showError('Semua field harus diisi');
    if (pass.length < 6) return showError('Password minimal 6 karakter');
    
    // Cek email sudah ada (case-insensitive)
    const exists = getUsers().find(u => (u.email || '').toLowerCase().trim() === email);
    if (exists) return showError('Email sudah terdaftar');
    
    // Cek batasan admin maksimal 3
    if (role === 'admin') {
        const admins = getUsers().filter(u => u.role === 'admin');
        if (admins.length >= 3) return showError('Jumlah admin sudah mencapai batas maksimal (3)');
    }
    
    const btn = window.event?.target || document.querySelector('#register-form button');
    btn.disabled = true;
    btn.textContent = 'Memproses...';
    
    window.dataSdk.create({ 
        type: 'user', 
        name, 
        email, 
        password: pass, 
        role, 
        photo: '', 
        theme: 'light', 
        is_blocked: false, 
        created_at: new Date().toISOString() 
    }).then(r => {
        if (r.isOk) { 
            toast('✅ Akun berhasil dibuat! Silakan login.'); 
            showLogin(); 
            document.getElementById('login-email').value = email;
            document.getElementById('login-pass').value = '';
        }
        else { 
            showError('❌ Gagal mendaftar: ' + (r.error?.message || 'Silakan coba lagi'));
        }
        btn.disabled = false;
        btn.textContent = 'Daftar';
    });
}

async function loginWithGoogle() {
    if (!await ensureDataReady()) return showError('❌ Sistem gagal dimuat. Silakan refresh halaman.');
    // Fungsi dihapus - gunakan login email/password saja
}

async function doLogin() {
    hideError();
    if (!await ensureDataReady()) return showError('❌ Sistem gagal dimuat. Silakan refresh halaman.');
    
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-pass').value;
    
    if (!email || !pass) return showError('Email dan password harus diisi');
    
    // Cek pengguna di data lokal
    const user = getUsers().find(u => {
        const uEmail = (u.email || '').toLowerCase().trim();
        const inputEmail = email.toLowerCase().trim();
        return uEmail === inputEmail && u.password === pass;
    });
    
    if (!user) return showError('Email atau password salah');
    
    const isBlocked = user.is_blocked === true || user.is_blocked === 'true';
    if (isBlocked) return showError('⛔ Akun Anda telah diblokir');
    
    // Login berhasil
    currentUser = user;
    appTheme = user.theme || 'light';
    applyTheme();
    document.getElementById('page-login').classList.add('hidden');
    document.getElementById('page-app').classList.remove('hidden');
    renderSidebar();
    navigate('dashboard');
    toast('✅ Selamat datang, ' + currentUser.name);
}

function logout() {
    currentUser = null;
    document.getElementById('page-app').classList.add('hidden');
    document.getElementById('page-login').classList.remove('hidden');
    document.getElementById('login-email').value = '';
    document.getElementById('login-pass').value = '';
}

function applyTheme() {
    if (appTheme === 'dark') document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
}

// ============ NAVIGATION ============
function getMenuItems() {
    const role = currentUser?.role;
    let items = [
        { id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard' }
    ];
    if (role === 'admin' || role === 'wali_kelas') {
        items.push(
            { id: 'kelas', icon: 'school', label: 'Kelas' },
            { id: 'siswa', icon: 'users', label: 'Siswa' },
            { id: 'jadwal', icon: 'calendar', label: 'Jadwal' },
            { id: 'absen', icon: 'clipboard-check', label: 'Absensi' },
            { id: 'jurnal', icon: 'book-open', label: 'Jurnal Mengajar' }
        );
    }
    if (role === 'staff') {
        items.push(
            { id: 'absen', icon: 'clipboard-check', label: 'Absensi' }
        );
    }
    if (role === 'admin') {
        items.push({ id: 'pengguna', icon: 'users-cog', label: 'Pengguna' });
    }
    items.push({ id: 'pengaturan', icon: 'settings', label: 'Pengaturan' });
    return items;
}

function renderSidebar() {
    const nav = document.getElementById('sidebar-nav');
    const items = getMenuItems();
    nav.innerHTML = items.map(i => `
        <button onclick="navigate('${i.id}')" class="sidebar-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition ${currentPage === i.id ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700'}">
            <i data-lucide="${i.icon}" class="w-4 h-4"></i> ${i.label}
        </button>
    `).join('');
    document.getElementById('user-name-display').textContent = currentUser.name;
    document.getElementById('user-role-display').textContent = currentUser.role;
    document.getElementById('user-avatar').textContent = currentUser.name.charAt(0).toUpperCase();
    lucide.createIcons();
}

function navigate(page) {
    currentPage = page;
    renderSidebar();
    renderCurrentPage();
}

function renderCurrentPage() {
    const mc = document.getElementById('main-content');
    switch(currentPage) {
        case 'dashboard': mc.innerHTML = renderDashboard(); break;
        case 'kelas': mc.innerHTML = renderKelas(); break;
        case 'siswa': mc.innerHTML = renderSiswa(); break;
        case 'jadwal': mc.innerHTML = renderJadwal(); break;
        case 'absen': mc.innerHTML = renderAbsen(); break;
        case 'jurnal': mc.innerHTML = renderJurnal(); break;
        case 'pengguna': mc.innerHTML = renderPengguna(); break;
        case 'pengaturan': mc.innerHTML = renderPengaturan(); break;
        default: mc.innerHTML = renderDashboard();
    }
    lucide.createIcons();
}

function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    sb.classList.toggle('hidden');
    sb.classList.toggle('fixed');
    sb.classList.toggle('z-40');
    sb.classList.toggle('inset-0');
}

// ============ DASHBOARD ============
function renderDashboard() {
    const classes = getClasses();
    const students = getStudents();
    const attendance = getAttendance();
    const journals = getJournals();

    // Attendance chart per class
    let chartHTML = '';
    if (classes.length > 0) {
        chartHTML = `<div class="mt-6 bg-white dark:bg-slate-800 rounded-xl p-5 shadow-sm border border-slate-200 dark:border-slate-700">
            <h3 class="font-semibold mb-4 text-base">Grafik Kehadiran per Kelas</h3>
            <div class="space-y-3">
                ${classes.map(c => {
                    const classStudents = students.filter(s => s.class_id === c.class_name);
                    const classAtt = attendance.filter(a => a.class_id === c.class_name);
                    const hadir = classAtt.filter(a => a.status === 'HADIR').length;
                    const total = classAtt.length || 1;
                    const pct = Math.round((hadir / total) * 100);
                    return `<div>
                        <div class="flex justify-between text-sm mb-1"><span>${c.class_name}</span><span class="font-medium">${pct}%</span></div>
                        <div class="h-3 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                            <div class="h-full bg-emerald-500 rounded-full transition-all" style="width:${pct}%"></div>
                        </div>
                    </div>`;
                }).join('')}
            </div>
        </div>`;
    }

    return `<div class="fade-in">
        <h2 class="text-2xl font-bold mb-6">Dashboard</h2>
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3">
            ${statCard('school', 'Kelas', classes.length, 'blue')}
            ${statCard('users', 'Siswa', students.length, 'emerald')}
            ${statCard('clipboard-check', 'Absensi', attendance.length, 'amber')}
            ${statCard('book-open', 'Jurnal', journals.length, 'rose')}
            ${statCard('user-check', 'Guru', getUsers().length, 'cyan')}
        </div>
        ${chartHTML}
    </div>`;
}

function statCard(icon, label, count, color) {
    return `<div class="card-hover bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm border border-slate-200 dark:border-slate-700">
        <div class="w-9 h-9 rounded-lg bg-${color}-100 dark:bg-${color}-900/30 flex items-center justify-center mb-2">
            <i data-lucide="${icon}" class="w-4 h-4 text-${color}-600 dark:text-${color}-400"></i>
        </div>
        <p class="text-2xl font-bold">${count}</p>
        <p class="text-xs text-slate-500">${label}</p>
    </div>`;
}

// ============ KELAS ============
function renderKelas() {
    const classes = getClasses();
    return `<div class="fade-in">
        <div class="flex items-center justify-between mb-5">

async function importKelasFromFile() {
    const file = document.getElementById('class-file').files[0];
    if (!file) return toast('Pilih file terlebih dahulu', 'error');
    
    try {
        const arrayBuffer = await file.arrayBuffer();
        const uint8Array = new Uint8Array(arrayBuffer);
        
        // AGGRESSIVE ENCODING DETECTION - Try multiple with stricter validation
        let text = '';
        const encodings = ['utf-8', 'utf-16', 'iso-8859-1', 'windows-1252', 'cp1252'];
        let usedEncoding = '';
        
        for (const enc of encodings) {
            try {
                const decoded = new TextDecoder(enc, { fatal: true }).decode(uint8Array);
                // Strict validation: must contain Latin letters
                if (/[a-zA-Z]/.test(decoded) && decoded.length > 5) {
                    text = decoded;
                    usedEncoding = enc;
                    break;
                }
            } catch (e) {
                continue;
            }
        }
        
        if (!text) {
            return toast('❌ File tidak bisa dibaca. Pastikan format Excel atau CSV yang benar', 'error');
        }
        
        // AGGRESSIVE CLEANING
        text = text
            .replace(/[\x00-\x08\x0B-\x0C\x0E-\x1F]/g, '') // Remove control chars
            .replace(/\ufffd/g, '?') // Replace replacement char
            .replace(/[\u202E\u202D\u202C]/g, '') // Remove RTL/LTR marks
            .replace(/[^\x20-\x7E\n\r\t]/g, (char) => {
                // Keep only printable ASCII + newline/tab, replace others
                const code = char.charCodeAt(0);
                if (code >= 128 && code <= 255) return char; // Keep extended Latin
                return '';
            });
        
        const lines = text.split(/[\r\n]+/)
            .map(l => l.trim())
            .filter(l => l.length > 0 && /[a-zA-Z]/.test(l)); // Must contain letters
        
        if (lines.length < 2) {
            return toast('❌ File terlalu kecil atau kosong. Minimal 2 baris (header + 1 data)', 'error');
        }
        
        // Detect header & delimiter
        const firstLine = lines[0];
        const delimiter = firstLine.includes('\t') ? '\t' : firstLine.includes(';') ? ';' : ',';
        
        // Smart header detection
        const firstLineLower = firstLine.toLowerCase();
        const hasHeader = /nama|kelas|tingkat|class|level|name/.test(firstLineLower);
        const startIdx = hasHeader ? 1 : 0;
        
        let imported = 0;
        const seenClasses = new Set();
        
        for (let i = startIdx; i < lines.length; i++) {
            const line = lines[i].trim();
            if (line.length < 2) continue;
            
            // Split by delimiter
            let parts = line.split(delimiter).map(s => 
                s.trim()
                    .replace(/^["'`\s]+|["'`\s]+$/g, '')
                    .replace(/^=/g, '')
                    .substring(0, 100)
                    .trim()
            ).filter(s => s.length > 0);
            
            if (parts.length < 1) continue;
            
            const name = parts[0];
            const level = (parts[1] || 'VII').substring(0, 1).toUpperCase();
            
            // Strict validation
            if (!/^[a-zA-Z0-9\-\s\.]+$/.test(name)) continue; // Only alphanumeric, dash, space, dot
            if (!/^[VII|VIII|IX]$/.test(level)) continue; // Only valid levels
            if (name.length < 2 || name.length > 50) continue; // Reasonable length
            
            // Deduplicate
            const key = `${name}|${level}`.toLowerCase();
            if (seenClasses.has(key)) continue;
            seenClasses.add(key);
            
            // Check if exists in DB
            const exists = getClasses().find(c => c.class_name.toLowerCase() === name.toLowerCase());
            if (!exists) {
                const r = await window.dataSdk.create({
                    type: 'class',
                    class_name: name,
                    class_level: level || 'VII',
                    created_at: new Date().toISOString()
                });
                if (r.isOk) imported++;
            }
        }
        
        if (imported > 0) {
            toast(`✅ Impor ${imported} kelas berhasil!`);
            renderCurrentPage();
        } else {
            toast('⚠️ Tidak ada data baru yang diimpor (semua sudah ada atau format invalid)', 'info');
        }
    } catch (err) {
        console.error('Import error:', err);
        toast('❌ Error: ' + (err.message || 'File corrupt. Buat ulang di Excel → Save As → CSV UTF-8'), 'error');
    }
}

function renderSiswa() {
    const filterClass = document.getElementById('filter-class')?.value || '';
    let students = getStudents();
    if (filterClass) students = students.filter(s => s.class_id === filterClass);

    const totalStudents = getStudents().length;
    const classes = getClasses();
    const classOrder = new Map(classes.map((c, i) => [c.class_name, i]));

    const groupedStudents = {};
    students.forEach(s => {
        const className = s.class_id || 'Tanpa Kelas';
        if (!groupedStudents[className]) groupedStudents[className] = [];
        groupedStudents[className].push(s);
    });

    const classNames = Object.keys(groupedStudents).sort((a, b) => {
        const orderA = classOrder.has(a) ? classOrder.get(a) : 9999;
        const orderB = classOrder.has(b) ? classOrder.get(b) : 9999;
        if (orderA !== orderB) return orderA - orderB;
        return a.localeCompare(b, 'id', { numeric: true, sensitivity: 'base' });
    });

    const tableHeader = `
        <thead class="bg-slate-50 dark:bg-slate-700">
            <tr>
                <th class="px-4 py-3 text-left w-14">No</th>
                <th class="px-4 py-3 text-left">Induk</th>
                <th class="px-4 py-3 text-left">NISN</th>
                <th class="px-4 py-3 text-left">Nama Siswa</th>
                <th class="px-4 py-3 text-left">JK</th>
                <th class="px-4 py-3 text-center w-28">Aksi</th>
            </tr>
        </thead>`;

    const renderRows = (studentList) => studentList.map((s, idx) => `
        <tr class="border-t border-slate-100 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/40">
            <td class="px-4 py-3 text-xs font-medium">${idx + 1}</td>
            <td class="px-4 py-3 text-xs">${s.nis || '-'}</td>
            <td class="px-4 py-3 text-xs">${s.nisn || '-'}</td>

            <td class="px-4 py-3 text-center">
                <button onclick="deleteStudent('${s.__backendId}')" class="px-3 py-1 bg-red-600 hover:bg-red-700 text-white rounded-lg text-xs font-medium inline-flex items-center gap-1">
                    <i data-lucide="trash-2" class="w-3 h-3"></i> Hapus
                </button>
            </td>
        </tr>`).join('');

    const groupedTablesHTML = students.length === 0
        ? `<div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-8 text-center text-slate-400">Belum ada data siswa</div>`
        : classNames.map(className => {
            const list = groupedStudents[className];
            return `
                <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden mb-5">
                    <div class="flex items-center justify-between px-4 py-3 bg-slate-100 dark:bg-slate-700 border-b border-slate-200 dark:border-slate-600">
                        <div>
                            <h3 class="font-bold text-base text-slate-800 dark:text-slate-100">Kelas ${className}</h3>
                            <p class="text-xs text-slate-500 dark:text-slate-400">Data siswa ditampilkan terpisah berdasarkan kelas</p>
                        </div>
                        <span class="px-3 py-1 rounded-full bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 text-xs font-semibold">${list.length} siswa</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            ${tableHeader}
                            <tbody>${renderRows(list)}</tbody>
                        </table>
                    </div>
                </div>`;
        }).join('');

    return `<div class="fade-in">
        <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
            <div>
                <h2 class="text-2xl font-bold">Data Siswa</h2>

        </div>

async function importSiswaFromFile() {
    const input = document.getElementById('siswa-import-file');
    const statusEl = document.getElementById('siswa-import-status');
    const file = input?.files?.[0];

    if (!file) {
        if (statusEl) statusEl.textContent = 'Belum ada file yang dipilih.';
        return toast('Pilih file Excel terlebih dahulu', 'error');
    }

    if (statusEl) statusEl.textContent = `Memproses file: ${file.name} ...`;
    toast('⏳ File sedang diproses...', 'info');

    try {
        await ensureDataReady();

        const fileName = (file.name || '').toLowerCase();
        let rows = [];

        if (fileName.endsWith('.xlsx') || fileName.endsWith('.xls')) {
            if (!window.XLSX) {
                throw new Error('Library pembaca Excel belum termuat. Pastikan koneksi internet aktif lalu buka ulang aplikasi.');
            }

            const arrayBuffer = await file.arrayBuffer();
            const workbook = XLSX.read(arrayBuffer, { type: 'array', cellDates: false, raw: false });

            workbook.SheetNames.forEach(sheetName => {
                const sheet = workbook.Sheets[sheetName];
                const sheetRows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                rows.push(...extractStudentsFromRows(sheetRows, sheetName));
            });
        } else if (fileName.endsWith('.csv')) {
            const text = await file.text();
            rows = parseCsvStudents(text);
        } else {
            throw new Error('Format file tidak didukung. Gunakan .xlsx, .xls, atau .csv');
        }

        if (!rows.length) {
            if (statusEl) statusEl.textContent = 'Data siswa tidak ditemukan. Pastikan kolom berisi NO, INDUK/NIS, NISN, NAMA SISWA, dan L/P.';
            return toast('❌ Data siswa tidak ditemukan di file', 'error');
        }

        const existingClasses = getClasses();
        const existingStudents = getStudents();
        const classCache = new Map(existingClasses.map(c => [String(c.class_name || '').toLowerCase(), c]));
        const studentKeyCache = new Set(existingStudents.map(s => makeStudentKey(s)).filter(Boolean));

        let classesCreated = 0;
        let imported = 0;
        let skipped = 0;

        for (const row of rows) {
            const className = row.class_id;
            const classLevel = row.class_level;
            const classKey = String(className).toLowerCase();

            if (!classCache.has(classKey)) {
                const classResult = await window.dataSdk.create({
                    type: 'class',
                    class_name: className,
                    class_level: classLevel,
                    created_at: new Date().toISOString()
                });
                if (classResult.isOk) {
                    classesCreated++;
                    classCache.set(classKey, classResult.value || { class_name: className, class_level: classLevel });
                }
            }

            const newKey = makeStudentKey(row);
            if (!newKey || studentKeyCache.has(newKey)) {
                skipped++;
                continue;
            }

            const result = await window.dataSdk.create({
                type: 'student',
                nis: row.nis || '',
                nisn: row.nisn || '',
                student_name: row.student_name,
                class_id: className,
                gender: row.gender,
                created_at: new Date().toISOString()
            });

            if (result.isOk) {
                imported++;
                studentKeyCache.add(newKey);
            } else {
                skipped++;
            }
        }

        const message = `✅ Import selesai: ${imported} siswa masuk, ${classesCreated} kelas dibuat${skipped ? `, ${skipped} data dilewati` : ''}`;
        if (statusEl) statusEl.textContent = message;
        toast(message);
        renderCurrentPage();
    } catch (err) {
        console.error('Import siswa error:', err);
        const message = '❌ Gagal import: ' + (err.message || 'File tidak valid');
        if (statusEl) statusEl.textContent = message;
        toast(message, 'error');
    } finally {
        if (input) input.value = '';
    }
}

function makeStudentKey(student) {
    const classId = String(student.class_id || '').trim().toLowerCase();
    const nisn = String(student.nisn || '').trim().toLowerCase();
    const nis = String(student.nis || '').trim().toLowerCase();
    const name = String(student.student_name || '').trim().toLowerCase();
    if (nisn) return `${classId}|nisn|${nisn}`;
    if (nis) return `${classId}|nis|${nis}`;
    if (name) return `${classId}|name|${name}`;
    return '';
}

function normalizeClassName(rawClass) {
    let value = String(rawClass || '').trim().toUpperCase();
    value = value.replace(/^KELAS\s+/i, '').replace(/\s+/g, '');

    const match = value.match(/^([789])[-\s]*([A-K])$/i);
    if (!match) return null;

    const roman = { '7': 'VII', '8': 'VIII', '9': 'IX' }[match[1]];
    return {
        class_name: `${roman} ${match[2].toUpperCase()}`,
        class_level: roman
    };
}

function normalizeGender(value) {
    const v = String(value || '').trim().toUpperCase();
    if (v.startsWith('P')) return 'P';
    return 'L';
}

function findHeaderRow(sheetRows) {
    for (let i = 0; i < sheetRows.length; i++) {
        const rowText = sheetRows[i].map(cell => String(cell || '').trim().toUpperCase()).join('|');
        if ((rowText.includes('NAMA') || rowText.includes('NAMA SISWA')) && (rowText.includes('INDUK') || rowText.includes('NIS'))) {
            return i;
        }
    }
    return -1;
}

function findColumnIndex(headerRow, patterns, fallbackIndex) {
    for (let i = 0; i < headerRow.length; i++) {
        const text = String(headerRow[i] || '').trim().toUpperCase();
        if (patterns.some(pattern => pattern.test(text))) return i;
    }
    return fallbackIndex;
}

function extractStudentsFromRows(sheetRows, sheetName = '') {
    const classInfo = normalizeClassName(sheetName);
    if (!classInfo) return [];

    const headerIndex = findHeaderRow(sheetRows);
    const headerRow = headerIndex >= 0 ? sheetRows[headerIndex] : [];
    const startRow = headerIndex >= 0 ? headerIndex + 1 : 0;

    const idxNis = findColumnIndex(headerRow, [/^INDUK$/, /^NIS$/, /NO\s*INDUK/], 1);
    const idxNisn = findColumnIndex(headerRow, [/^NISN$/], 2);
    const idxName = findColumnIndex(headerRow, [/NAMA/], 3);
    const idxGender = findColumnIndex(headerRow, [/^L\/P$/, /^JK$/, /KELAMIN/], 4);

    const output = [];
    for (let i = startRow; i < sheetRows.length; i++) {
        const row = sheetRows[i] || [];
        const name = String(row[idxName] || '').trim();
        const nis = String(row[idxNis] || '').trim();
        const nisn = String(row[idxNisn] || '').trim();
        const gender = normalizeGender(row[idxGender]);

        if (!name || name.length < 2) continue;
        if (/^(NAMA|NAMA SISWA|JUMLAH|WALI|GURU|TAHUN|DAFTAR)$/i.test(name)) continue;

        output.push({
            nis,
            nisn,
            student_name: name,
            gender,
            class_id: classInfo.class_name,
            class_level: classInfo.class_level
        });
    }
    return output;
}

function parseCsvStudents(text) {
    const cleaned = String(text || '').replace(/^\uFEFF/, '').trim();
    if (!cleaned) return [];

    const delimiter = cleaned.includes('\t') ? '\t' : cleaned.includes(';') ? ';' : ',';
    const lines = cleaned.split(/\r?\n/).map(line => line.trim()).filter(Boolean);
    const output = [];
    let currentClass = null;

    for (const line of lines) {
        const parts = line.split(delimiter).map(part => part.trim().replace(/^['"]|['"]$/g, ''));
        const first = parts[0] || '';
        const classInfo = normalizeClassName(first);

        if (classInfo && parts.length === 1) {
            currentClass = classInfo;
            continue;
        }

        const rowText = parts.join('|').toUpperCase();
        if (rowText.includes('NAMA') && (rowText.includes('NIS') || rowText.includes('INDUK'))) continue;

        if (!currentClass && classInfo) {
            currentClass = classInfo;
        }

        let nis = '', nisn = '', name = '', gender = 'L';

        if (parts.length >= 5 && normalizeClassName(parts[0])) {
            const cls = normalizeClassName(parts[0]);
            currentClass = cls;
            nis = parts[1] || '';
            nisn = parts[2] || '';
            name = parts[3] || '';
            gender = normalizeGender(parts[4]);
        } else if (parts.length >= 4 && currentClass) {
            nis = parts[0] || '';
            nisn = parts[1] || '';
            name = parts[2] || '';
            gender = normalizeGender(parts[3]);
        } else if (parts.length >= 3 && currentClass) {
            nis = parts[0] || '';
            name = parts[1] || '';
            gender = normalizeGender(parts[2]);
        }

        if (currentClass && name && name.length > 1) {
            output.push({
                nis,
                nisn,
                student_name: name,
                gender,
                class_id: currentClass.class_name,
                class_level: currentClass.class_level
            });
        }
    }

    return output;
}

async function syncSiswaFromGoogle() {
    const btn = window.event?.target || document.querySelector('#register-form button');
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin inline"></i> Menyinkronkan...';
    
    try {
        // Panggil Google Apps Script untuk mengambil data siswa
        const response = await fetch('https://script.google.com/macros/s/AKfycbw5qrv900Z2YhSKpACkOBAyY_WdoeLhW46nI0kfVTefDKci6uro0fNRk1in9COtijFLSQ/exec?action=getSiswaData', {
            method: 'GET',
            mode: 'cors'
        });
        
        const result = await response.json();
        
        if (!result.success || !result.data) {
            toast('❌ Gagal mengambil data dari Spreadsheet', 'error');
            btn.disabled = false;
            btn.innerHTML = '<i data-lucide="refresh-cw" class="w-4 h-4"></i> Sinkronkan Sekarang';
            return;
        }
        
        const siswaData = result.data;
        const classesToCreate = new Map();
        const seenNIS = new Set();
        let imported = 0;
        let updated = 0;
        let skipped = 0;
        
        // Group data by class
        for (const siswa of siswaData) {
            if (!siswa.kelas || !siswa.nis) {
                skipped++;
                continue;
            }
            
            const key = (siswa.kelas + siswa.nis).toLowerCase();
            if (seenNIS.has(key)) {
                skipped++;
                continue;
            }
            seenNIS.add(key);
            
            // Parse kelas (e.g., "8A" -> "VIII A")
            const match = siswa.kelas.match(/(\d)([A-K])/i);
            if (!match) {
                skipped++;
                continue;
            }
            
            const [, level, letter] = match;
            const levelRoman = ['', 'VII', 'VIII', 'IX'][parseInt(level)];
            const className = levelRoman + ' ' + letter.toUpperCase();
            
            if (!classesToCreate.has(className)) {
                classesToCreate.set(className, { level: levelRoman, students: [] });
            }
            
            classesToCreate.get(className).students.push({
                nis: siswa.nis,
                nisn: siswa.nisn || '',
                student_name: siswa.nama || '',
                gender: (siswa.jk || 'L')[0].toUpperCase()
            });
        }
        
        // Create classes
        for (const [className, classData] of classesToCreate) {
            const exists = getClasses().find(c => c.class_name === className);
            if (!exists) {
                await window.dataSdk.create({
                    type: 'class',
                    class_name: className,
                    class_level: classData.level,
                    created_at: new Date().toISOString()
                });
            }
        }
        
        // Import/Update students
        for (const [className, classData] of classesToCreate) {
            for (const std of classData.students) {
                const exists = getStudents().find(s => 
                    s.nis && s.nis.toLowerCase().trim() === std.nis.toLowerCase().trim()
                );
                
                if (!exists) {
                    const r = await window.dataSdk.create({
                        type: 'student',
                        nis: std.nis,
                        nisn: std.nisn,
                        student_name: std.student_name,
                        class_id: className,
                        gender: std.gender,
                        created_at: new Date().toISOString()
                    });
                    if (r.isOk) imported++;
                } else {
                    // Update if data changed
                    if (exists.student_name !== std.student_name || exists.gender !== std.gender || exists.class_id !== className) {
                        const rec = {
                            ...exists,
                            nisn: std.nisn || exists.nisn,
                            student_name: std.student_name || exists.student_name,
                            gender: std.gender || exists.gender,
                            class_id: className
                        };
                        const r = await window.dataSdk.update(rec);
                        if (r.isOk) updated++;
                    }
                }
            }
        }
        
        const msg = `✅ Sinkronisasi berhasil! ${imported} siswa baru, ${updated} diperbarui${skipped > 0 ? `, ${skipped} di-skip` : ''}`;
        toast(msg);
        renderCurrentPage();
    } catch (err) {
        console.error('Sync error:', err);
        toast('❌ Error: ' + (err.message || 'Koneksi ke server gagal'), 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="refresh-cw" class="w-4 h-4"></i> Sinkronkan Sekarang';
    }
}

// ============ SYNC TO GOOGLE SHEETS ============
async function syncDataToGoogleSheets(dataType = 'all') {
    if (allData.length === 0) {
        toast('Tidak ada data untuk disinkronkan', 'info');
        return;
    }
    
    let dataToSync = [];
    
    // Filter data berdasarkan tipe
    if (dataType === 'all') {
        dataToSync = allData;
    } else {
        dataToSync = allData.filter(d => d.type === dataType);
    }
    
    if (dataToSync.length === 0) {
        toast('Tidak ada data ' + dataType + ' untuk disinkronkan', 'info');
        return;
    }
    
    try {
        const payload = {
            action: 'saveData',
            dataType: dataType,
            data: dataToSync,
            timestamp: new Date().toISOString(),
            userId: currentUser?.__backendId || 'unknown'
        };
        
        const response = await fetch('https://script.google.com/macros/s/AKfycbw5qrv900Z2YhSKpACkOBAyY_WdoeLhW46nI0kfVTefDKci6uro0fNRk1in9COtijFLSQ/exec', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        const result = await response.json();
        
        if (result.success) {
            // Mark as synced
            for (const item of dataToSync) {
                const rec = allData.find(d => d.__backendId === item.__backendId);
                if (rec) rec.synced_to_sheet = true;
            }
            toast('✅ ' + dataToSync.length + ' data berhasil disinkronkan ke Google Sheets');
        } else {
            toast('⚠️ Sinkronisasi: ' + (result.message || 'Silakan coba lagi'), 'info');
        }
    } catch (err) {
        console.error('Sync error:', err);
        toast('⚠️ Sinkronisasi gagal - cek koneksi internet', 'info');
    }
}

// Auto-sync setiap kali data berubah
async function autoSyncToSheet(dataType) {
    try {
        const dataToSync = allData.filter(d => d.type === dataType && !d.synced_to_sheet);
        
        if (dataToSync.length === 0) return;
        
        const response = await fetch('https://script.google.com/macros/s/AKfycbw5qrv900Z2YhSKpACkOBAyY_WdoeLhW46nI0kfVTefDKci6uro0fNRk1in9COtijFLSQ/exec', {
            method: 'POST',
            body: JSON.stringify({
                action: 'saveData',
                dataType: dataType,
                data: dataToSync,
                timestamp: new Date().toISOString(),
                userId: currentUser?.__backendId || 'unknown'
            })
        });
        
        const result = await response.json();
        if (result.success) {
            for (const item of dataToSync) {
                const rec = allData.find(d => d.__backendId === item.__backendId);
                if (rec) rec.synced_to_sheet = true;
            }
        }
    } catch (err) {
        console.error('Auto-sync error:', err);
    }
}

    const students = getStudents();
    let attendance = getAttendance();
    if (filterClass) attendance = attendance.filter(a => a.class_id === filterClass);
    if (filterMonth) attendance = attendance.filter(a => a.date && a.date.startsWith(filterMonth));

    // Rekap
    const hadir = attendance.filter(a => a.status === 'HADIR').length;
    const izin = attendance.filter(a => a.status === 'IZIN').length;
    const sakit = attendance.filter(a => a.status === 'SAKIT').length;
    const alpa = attendance.filter(a => a.status === 'ALPA').length;

    // Hitung absensi per hari
    const hari = ['Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
    const absenPerHari = {};
    hari.forEach(h => absenPerHari[h] = { HADIR: 0, IZIN: 0, SAKIT: 0, ALPA: 0 });

        if (!a.date) return;
        const d = new Date(a.date);

async function importAbsenFromFile() {
    const file = document.getElementById('absen-file').files[0];
    if (!file) return toast('Pilih file terlebih dahulu', 'error');
    
    try {
        const arrayBuffer = await file.arrayBuffer();
        const uint8Array = new Uint8Array(arrayBuffer);
        
        // AGGRESSIVE ENCODING DETECTION
        let text = '';
        const encodings = ['utf-8', 'utf-16', 'iso-8859-1', 'windows-1252', 'cp1252'];
        
        for (const enc of encodings) {
            try {
                const decoded = new TextDecoder(enc, { fatal: true }).decode(uint8Array);
                if (/[a-zA-Z0-9]/.test(decoded) && decoded.length > 5) {
                    text = decoded;
                    break;
                }
            } catch (e) {
                continue;
            }
        }
        
        if (!text) return toast('❌ File tidak bisa dibaca', 'error');
        
        // AGGRESSIVE CLEANING
        text = text
            .replace(/[\x00-\x08\x0B-\x0C\x0E-\x1F]/g, '')
            .replace(/\ufffd/g, '?')
            .replace(/[\u202E\u202D\u202C]/g, '')
            .replace(/[^\x20-\x7E\n\r\t]/g, (char) => {
                const code = char.charCodeAt(0);
                if (code >= 128 && code <= 255) return char;
                return '';
            });
        
        const lines = text.split(/[\r\n]+/)
            .map(l => l.trim())
            .filter(l => l.length > 0);
        
        if (lines.length < 2) return toast('❌ File terlalu kecil', 'error');
        
        const firstLine = lines[0];
        const delimiter = firstLine.includes('\t') ? '\t' : firstLine.includes(';') ? ';' : ',';
        const firstLineLower = firstLine.toLowerCase();
        const hasHeader = /tanggal|nama|kelas|status|date|name/.test(firstLineLower);
        const startIdx = hasHeader ? 1 : 0;
        
        let imported = 0;
        
        for (let i = startIdx; i < lines.length; i++) {
            const line = lines[i].trim();
            if (line.length < 2) continue;
            
            let parts = line.split(delimiter).map(s => 
                s.trim()
                    .replace(/^["'`\s]+|["'`\s]+$/g, '')
                    .replace(/^=/g, '')
                    .substring(0, 100)
                    .trim()
            ).filter(s => s.length > 0);
            
            if (parts.length < 3) continue;
            
            const [date, name, cls, status] = parts;
            
            // Validate data
            if (!date || date.length < 5) continue;
            if (!name || name.length < 2) continue;
            if (!cls || cls.length < 1) continue;
            if (!status || !/^(HADIR|IZIN|SAKIT|ALPA)$/i.test(status)) continue;
            
            const r = await window.dataSdk.create({
                type: 'attendance',
                date: date,
                student_name: name,
                class_id: cls,
                status: status.toUpperCase(),
                created_at: new Date().toISOString()
            });
            if (r.isOk) imported++;
        }
        
        if (imported > 0) {
            toast(`✅ Impor ${imported} data absensi berhasil!`);
            renderCurrentPage();
        } else {
            toast('⚠️ Tidak ada data baru diimpor', 'info');
        }
    } catch (err) {
        console.error('Import error:', err);
        toast('❌ Error: File corrupt atau format invalid', 'error');
    }
}

// ============ DOWNLOAD CSV ============
function downloadAbsensiCSV(filterClass, filterMonth) {
    let attendance = getAttendance();
    if (filterClass) attendance = attendance.filter(a => a.class_id === filterClass);
    if (filterMonth) attendance = attendance.filter(a => a.date && a.date.startsWith(filterMonth));

    // Buat header CSV
    let csv = 'Tanggal,Nama Siswa,Kelas,Status\n';
    
    // Tambah data
    attendance.forEach(a => {
        csv += `${a.date||''},${a.student_name||''},${a.class_id||''},${a.status||''}\n`;
    });

    // Download file
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    const bulan = filterMonth ? filterMonth.split('-')[1] : new Date().getMonth() + 1;
    const tahun = filterMonth ? filterMonth.split('-')[0] : new Date().getFullYear();
    
    link.setAttribute('href', url);
    link.setAttribute('download', `Absensi_${filterClass||'Semua'}_${bulan}-${tahun}.csv`);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    
    toast('File CSV berhasil diunduh');
}

    const overlay = document.createElement('div');
    overlay.className = 'fixed inset-0 bg-black/40 flex items-center justify-center z-50';
    overlay.innerHTML = `<div class="bg-white dark:bg-slate-800 rounded-xl p-6 max-w-sm mx-4 shadow-xl">
        <p class="font-semibold mb-2 text-red-600">Hapus Akun Pengguna?</p>
        <p class="text-sm text-slate-500 mb-4">Akun ini akan dihapus permanen beserta semua data terkait.</p>
        <div class="flex gap-2 justify-end">
            <button id="cancel-du" class="px-4 py-2 bg-slate-200 dark:bg-slate-600 rounded-lg text-sm">Batal</button>
            <button id="confirm-du" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm">Hapus</button>
        </div>
    </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#cancel-du').onclick = () => overlay.remove();
    overlay.querySelector('#confirm-du').onclick = async () => {
        overlay.remove();
        const rec = allData.find(d => d.__backendId === id);
        if (rec) {
            const r = await window.dataSdk.delete(rec);
            if (r.isOk) toast('Akun dihapus');
            else toast('Gagal menghapus', 'error');
        }
    };
}

// ============ SETTINGS ============
function renderSettings() {
    return `<div class="fade-in max-w-2xl">
        <h2 class="text-2xl font-bold mb-5">Pengaturan</h2>
        <div class="space-y-4">
            <!-- Profil & Foto -->
            <div class="bg-white dark:bg-slate-800 rounded-xl p-5 shadow-sm border border-slate-200 dark:border-slate-700">
                <h3 class="font-semibold mb-3 flex items-center gap-2"><i data-lucide="user" class="w-4 h-4"></i> Profil & Foto</h3>
                <div class="flex items-center gap-4 mb-4">
                    <div id="profile-photo-container" class="relative">
                        <img id="profile-photo-display" src="${currentUser.photo || ''}" alt="Foto Profil" class="w-20 h-20 rounded-full object-cover bg-blue-100 dark:bg-blue-900 border-2 border-blue-200 ${currentUser.photo?'':'hidden'}">
                        <div id="profile-photo-placeholder" class="w-20 h-20 rounded-full bg-blue-100 dark:bg-blue-900 flex items-center justify-center text-2xl font-bold text-blue-600 ${currentUser.photo?'hidden':''}">${currentUser.name.charAt(0)}</div>
                        <button onclick="document.getElementById('photo-input').click()" class="absolute -bottom-1 -right-1 bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-full shadow-lg">
                            <i data-lucide="camera" class="w-3 h-3"></i>
                        </button>
                    </div>
                    <input id="photo-input" type="file" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)">
                    <div>
                        <p class="font-medium">${currentUser.name}</p>
                        <p class="text-sm text-slate-500">${currentUser.email}</p>
                        <p class="text-xs text-slate-400 mt-1">Role: ${currentUser.role === 'wali_kelas' ? 'Wali Kelas' : currentUser.role}</p>
                        ${currentUser.photo ? `<button onclick="deleteProfilePhoto()" class="text-xs text-red-600 hover:underline mt-2">Hapus Foto</button>` : ''}
                    </div>
                </div>
            </div>
            <!-- Ubah Email/Password -->
            <div class="bg-white dark:bg-slate-800 rounded-xl p-5 shadow-sm border border-slate-200 dark:border-slate-700">
                <h3 class="font-semibold mb-3 flex items-center gap-2"><i data-lucide="edit" class="w-4 h-4"></i> Ubah Akun</h3>
                <div class="space-y-3">
                    <div><label class="text-sm font-medium">Email Baru</label><input id="set-email" type="email" value="${currentUser.email}" class="w-full mt-1 px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700 text-sm"></div>
                    <div><label class="text-sm font-medium">Password Baru</label><input id="set-pass" type="password" class="w-full mt-1 px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700 text-sm" placeholder="Kosongkan jika tidak diubah"></div>
                    <button onclick="updateAccount()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium">Simpan Perubahan</button>
                </div>
            </div>
            <!-- Tema -->
            <div class="bg-white dark:bg-slate-800 rounded-xl p-5 shadow-sm border border-slate-200 dark:border-slate-700">
                <h3 class="font-semibold mb-3 flex items-center gap-2"><i data-lucide="sun" class="w-4 h-4"></i> Tema</h3>
                <div class="flex gap-3">
                    <button onclick="setTheme('light')" class="px-4 py-2 rounded-lg text-sm font-medium ${appTheme==='light'?'bg-blue-600 text-white':'bg-slate-100 dark:bg-slate-700'}">Terang</button>
                    <button onclick="setTheme('dark')" class="px-4 py-2 rounded-lg text-sm font-medium ${appTheme==='dark'?'bg-blue-600 text-white':'bg-slate-100 dark:bg-slate-700'}">Gelap</button>
                </div>
            </div>
            <!-- Logout & Hapus -->
            <div class="bg-white dark:bg-slate-800 rounded-xl p-5 shadow-sm border border-slate-200 dark:border-slate-700">
                <h3 class="font-semibold mb-3 flex items-center gap-2"><i data-lucide="log-out" class="w-4 h-4"></i> Akun</h3>
                <div class="flex gap-3">
                    <button onclick="logout()" class="px-4 py-2 bg-slate-200 dark:bg-slate-600 hover:bg-slate-300 rounded-lg text-sm font-medium">Logout</button>
                    <button onclick="confirmDeleteAccount()" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-medium">Hapus Akun</button>
                </div>
            </div>
        </div>
    </div>`;
}

function renderPengaturan() {
    return renderSettings();
}

async function updateAccount() {
    const email = document.getElementById('set-email').value.trim();
    const pass = document.getElementById('set-pass').value;
    if (!email) return toast('Email tidak boleh kosong', 'error');
    const rec = allData.find(d => d.__backendId === currentUser.__backendId);
    if (!rec) return;
    rec.email = email;
    if (pass && pass.length >= 6) rec.password = pass;
    const r = await window.dataSdk.update(rec);
    if (r.isOk) { currentUser = rec; toast('Akun diperbarui'); renderCurrentPage(); }
    else toast('Gagal', 'error');
}

function handlePhotoUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
        const photoData = e.target.result;
        const rec = allData.find(d => d.__backendId === currentUser.__backendId);
        if (rec) {
            rec.photo = photoData;
            currentUser.photo = photoData;
            const r = await window.dataSdk.update(rec);
            if (r.isOk) { toast('Foto berhasil diupload'); renderCurrentPage(); }
            else toast('Gagal upload foto', 'error');
        }
    };
    reader.readAsDataURL(file);
}

async function deleteProfilePhoto() {
    const rec = allData.find(d => d.__backendId === currentUser.__backendId);
    if (rec) {
        rec.photo = '';
        currentUser.photo = '';
        const r = await window.dataSdk.update(rec);
        if (r.isOk) { toast('Foto berhasil dihapus'); renderCurrentPage(); }
        else toast('Gagal hapus foto', 'error');
    }
}

async function setTheme(theme) {
    appTheme = theme;
    applyTheme();
    const rec = allData.find(d => d.__backendId === currentUser.__backendId);
    if (rec) { rec.theme = theme; await window.dataSdk.update(rec); }
    renderCurrentPage();
}

async function adminResetPassword() {
    const userId = document.getElementById('admin-user-select').value;
    const newPass = document.getElementById('admin-new-pass').value;
    
    if (!userId || !newPass) return toast('Pilih pengguna dan masukkan password baru', 'error');
    if (newPass.length < 6) return toast('Password minimal 6 karakter', 'error');
    
    const rec = allData.find(d => d.__backendId === userId);
    if (!rec) return;
    
    rec.password = newPass;
    const r = await window.dataSdk.update(rec);
    if (r.isOk) {
        toast('Password berhasil direset');
        document.getElementById('admin-user-select').value = '';
        document.getElementById('admin-new-pass').value = '';
    }
    else toast('Gagal mereset password', 'error');
}

function confirmDeleteAccount() {
    const overlay = document.createElement('div');
    overlay.className = 'fixed inset-0 bg-black/40 flex items-center justify-center z-50';
    overlay.innerHTML = `<div class="bg-white dark:bg-slate-800 rounded-xl p-6 max-w-sm mx-4 shadow-xl">
        <p class="font-semibold mb-2 text-red-600">Hapus Akun?</p>
        <p class="text-sm text-slate-500 mb-4">Akun Anda akan dihapus permanen. Tindakan ini tidak dapat dibatalkan.</p>
        <div class="flex gap-2 justify-end">
            <button id="cancel-da" class="px-4 py-2 bg-slate-200 dark:bg-slate-600 rounded-lg text-sm">Batal</button>
            <button id="confirm-da" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm">Hapus</button>
        </div>
    </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#cancel-da').onclick = () => overlay.remove();
    overlay.querySelector('#confirm-da').onclick = async () => {
        overlay.remove();
        const rec = allData.find(d => d.__backendId === currentUser.__backendId);
        if (rec) await window.dataSdk.delete(rec);
        logout();
        toast('Akun dihapus');
    };
}

// ============ RESPONSIVE ============
window.addEventListener('resize', () => {
    const sb = document.getElementById('sidebar');
    if (window.innerWidth >= 1024) {
        sb.classList.remove('hidden', 'fixed', 'z-40', 'inset-0');
    }
});
